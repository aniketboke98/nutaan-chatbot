# ─── Railway: no Docker needed ───────────────────────────────────────────────
# Railway auto-detects Node.js and runs:
#   1. Build command (below)
#   2. Start command (below)

[build]
builder = "NIXPACKS"

# Railway build step:
# Install deps → run Remix build → sync Prisma schema to MongoDB
buildCommand = "npm install && npm run build && npx prisma db push --accept-data-loss"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
